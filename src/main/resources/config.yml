# SystemSkyblockStyleAddon configuration
# This file contains perk mechanics so they are not exposed in MayorSystem.

debug_logging: false

perks:
  prospector_week:
    meta:
      enabled: true
      display_name: "<gold>Prospector Week</gold>"
      icon: "IRON_PICKAXE"
      lore:
        - "<gray>Chance for extra ore while mining.</gray>"
    sssa:
      type: BLOCK_DROP_BONUS
      enabled: true
      chance: 0.08
      blocks: [STONE, DEEPSLATE, NETHERRACK]
      extra_drops:
        - material: RAW_IRON
          min: 1
          max: 1
        - material: COAL
          min: 1
          max: 2
      worlds: ["world", "world_nether"]
      fortune_scales: false

  smelters_decree:
    meta:
      enabled: true
      display_name: "<gold>Smelter's Decree</gold>"
      icon: "BLAST_FURNACE"
      lore:
        - "<gray>Ores drop as ingots.</gray>"
    sssa:
      type: AUTO_SMELT
      enabled: true
      chance: 1.0
      blocks: [IRON_ORE, DEEPSLATE_IRON_ORE, GOLD_ORE, DEEPSLATE_GOLD_ORE]
      mapping:
        IRON_ORE: IRON_INGOT
        DEEPSLATE_IRON_ORE: IRON_INGOT
        GOLD_ORE: GOLD_INGOT
        DEEPSLATE_GOLD_ORE: GOLD_INGOT

  harvest_yield:
    meta:
      enabled: true
      display_name: "<green>Harvest Yield</green>"
      icon: "WHEAT"
      lore:
        - "<gray>Bonus crops from fully grown harvests.</gray>"
    sssa:
      type: CROP_BONUS
      enabled: true
      chance: 0.15
      crops: [WHEAT, CARROTS, POTATOES, BEETROOTS]
      extra_amount_min: 1
      extra_amount_max: 1

  replant_blessing:
    meta:
      enabled: true
      display_name: "<aqua>Replant Blessing</aqua>"
      icon: "WOODEN_HOE"
      lore:
        - "<gray>Automatically replants fully grown crops.</gray>"
    sssa:
      type: AUTO_REPLANT
      enabled: true
      crops: [WHEAT, CARROTS, POTATOES, BEETROOTS]
      require_seed: true

  mob_bounty_program:
    meta:
      enabled: true
      display_name: "<red>Mob Bounty Program</red>"
      icon: "BONE"
      lore:
        - "<gray>Extra drops from common mobs.</gray>"
    sssa:
      type: MOB_DROP_BONUS
      enabled: true
      chance: 0.20
      entities: [ZOMBIE, SKELETON, CREEPER, SPIDER]
      extra_drops:
        - material: BONE
          min: 1
          max: 2
        - material: GUNPOWDER
          min: 1
          max: 1
      ignore_spawner_mobs: true

  xp_dividend:
    meta:
      enabled: true
      display_name: "<yellow>XP Dividend</yellow>"
      icon: "EXPERIENCE_BOTTLE"
      lore:
        - "<gray>More XP from blocks and mobs.</gray>"
    sssa:
      type: EXP_MULTIPLIER
      enabled: true
      multiplier: 1.25
      sources: [BLOCKS, MOBS]

  fishers_market:
    meta:
      enabled: true
      display_name: "<aqua>Fisher's Market</aqua>"
      icon: "COD"
      lore:
        - "<gray>Bonus fish while fishing.</gray>"
    sssa:
      type: FISHING_BONUS
      enabled: true
      chance: 0.25
      extra_loot:
        - material: COD
          min: 1
          max: 2
        - material: SALMON
          min: 1
          max: 1

  builders_amnesty:
    meta:
      enabled: true
      display_name: "<gray>Builder's Amnesty</gray>"
      icon: "FEATHER"
      lore:
        - "<gray>Reduces fall damage on cooldown.</gray>"
    sssa:
      type: FALL_PROTECT
      enabled: true
      damage_multiplier: 0.60
      cooldown_seconds: 10
      min_fall_damage_to_trigger: 4.0

  anvil_tax_cut:
    meta:
      enabled: true
      display_name: "<gold>Anvil Tax Cut</gold>"
      icon: "ANVIL"
      lore:
        - "<gray>Lower anvil repair costs.</gray>"
    sssa:
      type: ANVIL_DISCOUNT
      enabled: true
      multiplier: 0.70
      min_cost: 1
